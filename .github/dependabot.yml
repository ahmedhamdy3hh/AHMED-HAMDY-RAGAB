version: 2
updates:
  # npm dependencies - allow only patch/minor updates for stability
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 3
    reviewers:
      - "ahmedhamdy3hh"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    allow:
      - dependency-type: "all"
    ignore:
      # Ignore major version updates for these packages - need manual review
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "express"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "lucide-react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]

  # GitHub Actions - allow patch updates only
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:30"
    open-pull-requests-limit: 3
    reviewers:
      - "ahmedhamdy3hh"
    labels:
      - "ci"
      - "github-actions"
    commit-message:
      prefix: "ci(actions)"
    allow:
      - dependency-type: "all"
    ignore:
      # Major version updates for GitHub Actions need manual testing
      - dependency-name: "actions/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "docker/*"
        update-types: ["version-update:semver-major"]
